<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Bulma CSS -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css"
    >

    <!-- Custom CSS -->

<script type="text/javascript" src="https://gc.kis.v2.scr.kaspersky-labs.com/FD126C42-EBFA-4E12-B309-BB3FDD723AC1/main.js?attr=U7lODAXh5vf57_JBRookmbQCQsv5J2a-Qql9QYwhjhVsNYCM01-rcMh1kMpVdWPqKW6Vi7ZcstECAxMBD0AhKEpy2V1d_3UY6HEbUDyUYj8MeD_5j_3IYT4zxmG3EibxxRCwMp18t5bnwzm2p4f2LabJV5qhJz6697zkK9Fn0LM" charset="UTF-8"></script></head>
<body class="has-background-light">

<section class="section">
    <div class="container">

        <!-- Header -->
        <div class="has-text-centered mb-6">
            <h1 class="title is-2">📖 Daily Journal</h1>
            <p class="subtitle">
                Write down your thoughts and memories.
            </p>
        </div>

        <!-- Journal Form -->
        <div class="box">

            <h2 class="title is-4">New Journal Entry</h2>

            <form id="journalForm">

                <!-- Title -->
                <div class="field">
                    <label class="label">Entry Title</label>

                    <div class="control">
                        <input
                            id="title"
                            class="input"
                            type="text"
                            placeholder="Enter a title"
                            required
                        >
                    </div>
                </div>

                <!-- Date -->
                <div class="field">
                    <label class="label">Date</label>

                    <div class="control">
                        <input
                            id="date"
                            class="input"
                            type="date"
                            required
                        >
                    </div>
                </div>

                <!-- Mood -->
                <div class="field">
                    <label class="label">Mood</label>

                    <div class="control">
                        <div class="select is-fullwidth">
                            <select id="mood" required>
                                <option value="">Choose your mood</option>
                                <option>😊 Happy</option>
                                <option>😌 Calm</option>
                                <option>😄 Excited</option>
                                <option>😢 Sad</option>
                                <option>😡 Angry</option>
                                <option>😴 Tired</option>
                                <option>😰 Stressed</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Journal Content -->
                <div class="field">
                    <label class="label">Journal Entry</label>

                    <div class="control">
                        <textarea
                            id="content"
                            class="textarea"
                            rows="6"
                            placeholder="Write about your day..."
                            required
                        ></textarea>
                    </div>
                </div>

                <!-- Button -->
                <div class="field">
                    <div class="control">
                        <button
                            type="submit"
                            class="button is-primary is-fullwidth"
                        >
                            Save Entry
                        </button>
                    </div>
                </div>

            </form>

            <!-- Status Message -->
            <div id="message" class="mt-4"></div>

        </div>

        <!-- Saved Entries -->
        <div class="mt-6">

            <h2 class="title is-3">
                Saved Journal Entries
            </h2>

            <div
                id="entriesContainer"
                class="columns is-multiline"
            >

                <!-- Example Card -->

                <!--
                <div class="column is-half">
                    <div class="card">

                        <header class="card-header">
                            <p class="card-header-title">
                                My Day
                            </p>
                        </header>

                        <div class="card-content">
                            <div class="content">
                                Today was productive...
                            </div>

                            <p>
                                <strong>Date:</strong>
                                2026-07-14
                            </p>

                            <p>
                                <strong>Mood:</strong>
                                😊 Happy
                            </p>
                        </div>

                    </div>
                </div>
                -->

            </div>

        </div>

    </div>
</section>

<!-- JavaScript -->
<script src="app.js"></script>
